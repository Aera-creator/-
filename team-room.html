<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小队房间</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="team-room">
    <header class="topbar"><div class="brand"><span class="brand-mark">A</span><div><h1>旅迹 Atlas</h1><p>个性化旅游系统</p></div></div><div class="account"><span class="avatar">AL</span><div><b>Aera Lin</b><span>普通会员 · Lv.3</span></div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="side-title">系统模块</div><nav class="nav"><a href="./index.html" data-page="home">首页</a><a href="./recommend.html" data-page="recommend">发现目的地</a><a href="./route.html" data-page="route">行程规划</a><a href="./facility.html" data-page="facility">周边服务</a><a href="./diary.html" data-page="diary">游记社区</a><a href="./food.html" data-page="food">附近美食</a><a href="./concert.html" data-page="concert">演出行程</a><a href="./team.html" data-page="team">同行小队</a></nav></aside>
      <main class="content">
        <section class="page-hero module-hero team-hero">
          <div>
            <p class="hero-kicker">小队房间</p>
            <h2 id="team-room-name">小队加载中</h2>
            <p class="sub" id="team-room-meta">--</p>
            <p id="team-room-alert" class="subtle">--</p>
          </div>
          <div class="hero-actions">
            <a href="./team.html" class="hero-link ghost-link">返回同行小队</a>
          </div>
        </section>

        <div class="workspace-grid">
          <div class="workspace-main stack">
            <section class="panel-card">
              <div class="panel-head"><div><h3>共享路线</h3><p class="subtle">所有成员对齐后的当前路线</p></div></div>
              <div id="team-room-map" class="map-canvas"></div>
            </section>
            <section class="panel-card">
              <div class="panel-head"><div><h3>下一步安排</h3><p class="subtle">按当前路线顺序继续推进</p></div></div>
              <div id="team-room-plan" class="result empty-state"><p>正在整理下一步安排。</p></div>
            </section>
          </div>
          <aside class="workspace-side stack">
            <section class="panel-card">
              <div class="panel-head"><div><h3>成员状态</h3><p class="subtle">谁已经跟上路线，谁还需要同步</p></div></div>
              <div id="team-room-members" class="result empty-state"><p>正在加载成员状态。</p></div>
            </section>
          </aside>
        </div>
      </main>
    </div>
    <script type="module" src="./src/ui/pages.js"></script>
  </body>
</html>
